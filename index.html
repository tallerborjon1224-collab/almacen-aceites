<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almacén de Aceites</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff8c1a">
    <link rel="icon" type="image/png" href="icono.png">


<style>

/* ================= VARIABLES ================= */

:root{
    --naranja:#ff8c1a;
    --negro:#000;
    --gris:#1a1a1a;
    --gris2:#262626;
    --blanco:#fff;
    --verde:#4CAF50;
    --rojo:#c62828;
}

/* ================= BASE ================= */

body{
    margin:0;
    background:var(--negro);
    color:var(--blanco);
    font-family:Arial, sans-serif;
    padding:20px;
    padding-bottom:120px;
}

h1{
    text-align:center;
    color:var(--naranja);
    margin-bottom:25px;
}

.seccion{ display:none; }
.seccion.activa{ display:block; }

/* ================= BOTONES GENERALES ================= */

button{
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    padding:8px 14px;
    transition:0.15s ease;
}

button:active{
    transform:scale(0.95);
}
/* ================= INVENTARIO ================= */

.inventario-app{
    max-width:900px;
    margin:auto;
}

.card-item{
    background:var(--gris);
    border:2px solid var(--naranja);
    border-radius:18px;
    padding:20px;
    margin:18px 0;
    cursor:pointer;
    transition:0.2s;
}

.card-item:hover{
    transform:scale(1.02);
    box-shadow:0 0 12px rgba(255,140,26,0.4);
}

.card-item h3{ margin-bottom:8px; }
.card-item p{ margin:4px 0; color:#ccc; }

.stock-bajo{
    color:red;
    font-weight:bold;
}

/* ================= DETALLE PRODUCTO ================= */

.detalle-box{
    background:var(--gris);
    border:2px solid var(--naranja);
    border-radius:18px;
    padding:25px;
    margin-top:20px;
}

.precio-destacado{
    font-size:22px;
    color:var(--verde);
    font-weight:bold;
}

.stock-destacado{
    font-size:26px;
    color:var(--naranja);
    font-weight:bold;
    margin:18px 0;
}

/* ================= MOVIMIENTO STOCK ================= */

.movimiento-box{
    margin-top:20px;
    background:var(--gris2);
    padding:20px;
    border-radius:14px;
}

.movimiento-box h4{
    color:var(--naranja);
}

.movimiento-box input,
.movimiento-box textarea{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    background:#000;
    color:white;
}

.btn-sumar{ background:var(--verde); color:white; }
.btn-restar{ background:var(--rojo); color:white; }

/* ================= HISTORIAL ================= */

.historial-item{
    background:#111;
    padding:12px;
    border-radius:10px;
    margin:8px 0;
    color:#bbb;
    border-left:4px solid var(--naranja);
}

/* ================= VENTAS ================= */

.ventas-card{
    max-width:900px;
    margin:auto;
    padding:30px;
}

.tabla-ventas{
    width:100%;
    border-collapse:collapse;
}

.tabla-ventas th{
    padding:15px;
    border-bottom:2px solid var(--naranja);
}

.tabla-ventas td{
    padding:15px;
    text-align:center;
}

.tabla-ventas select,
.tabla-ventas input{
    width:100%;
    padding:8px;
    background:#000;
    color:white;
    border:none;
    text-align:center;
}

.botones-ventas{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
    flex-wrap:wrap;
}

.ganancia{
    text-align:center;
    font-size:24px;
    margin-top:20px;
}

/* ================= PRESUPUESTO ================= */

.presupuesto-box{
    max-width:500px;
    margin:40px auto;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.presupuesto-box input{
    padding:12px;
    border-radius:8px;
    border:none;
    background:#111;
    color:white;
}

/* ================= ORDENES (NUEVO DISEÑO PRO) ================= */

.ordenes-contenedor{
    max-width:600px;
    margin:20px auto;
    text-align:center;
}

.card-form{
    background:#1b1b1b;
    border:2px solid var(--naranja);
    border-radius:15px;
    padding:20px;
    margin-top:20px;
}

.card-form input,
.card-form textarea{
    width:100%;
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    border:none;
    background:#000;
    color:white;
}

.btn-nuevo{
    background:var(--naranja);
    color:white;
    padding:10px 18px;
    border-radius:10px;
    margin:10px;
}

.btn-secundario{
    background:#333;
    color:white;
    padding:10px 18px;
    border-radius:10px;
}

.btn-guardar{
    background:var(--naranja);
    color:white;
    width:100%;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
}

/* LISTA VEHICULOS */

.lista-card{
    margin-top:20px;
}

.vehiculo-item{
    background:#222;
    border-left:5px solid var(--naranja);
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    text-align:left;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){

    body{
        padding:12px;
        padding-bottom:130px;
    }

    h1{ font-size:22px; }

    .ventas-card{ padding:15px; }

    .tabla-ventas{ font-size:14px; }

    .ganancia{ font-size:20px; }
}
/* ================= MENU LATERAL PRO ================= */

/* ================= MENU APP ================= */

/* BOTON MENU */
.btn-menu{
    position:fixed;
    top:15px;
    left:15px;
    background:var(--naranja);
    color:black;
    border:none;
    font-size:22px;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    z-index:10000;
}

/* MENU LATERAL */
.menu-lateral{
    position:fixed;
    top:0;
    left:0;
    width:240px;
    height:100vh;
    background:#111;
    border-right:2px solid var(--naranja);
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
    transition:0.3s ease;
}

/* LOGO */
.menu-lateral .logo{
    text-align:center;
    color:var(--naranja);
    margin-bottom:20px;
}

/* BOTONES */
.menu-lateral button{
    background:#1a1a1a;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    text-align:left;
    cursor:pointer;
}

/* HOVER */
.menu-lateral button:hover{
    background:#262626;
}

/* ACTIVO */
.menu-lateral button.activo{
    background:var(--naranja);
    color:black;
    font-weight:bold;
}

/* MENU OCULTO */
.menu-cerrado{
    transform:translateX(-260px);
}

/* BODY */
body{
    margin-left:260px;
    transition:0.3s;
}

.body-expandido{
    margin-left:0 !important;
}
    
</style>
</head>

<body>
<button class="btn-menu" onclick="toggleMenu()">☰</button>
<!-- ================= MENU ================= -->
<div class="menu-lateral" id="menuLateral">

    <h2 class="logo">TALLER BORJON</h2>

    <button id="btnOrdenes" onclick="mostrar('ordenes')">
        📋 Órdenes de Trabajo
    </button>

    <button id="btnAlmacen" onclick="mostrar('almacen')" class="activo">
        🛢 Inventario
    </button>

    <button id="btnVentas" onclick="mostrar('ventas')">
        💰 Ventas
    </button>

    <button id="btnPresupuesto" onclick="mostrar('presupuesto')">
        📄 Presupuesto
    </button>

</div>

<!-- ================= INVENTARIO ================= -->
<section id="almacen" class="seccion activa">

<h1>Inventario del Taller</h1>

<div class="inventario-app">

    <!-- LISTA -->
    <div id="vistaLista"></div>

    </div>

    <!-- DETALLE -->
    <div id="vistaDetalle" style="display:none;">

        <button onclick="volverLista()">⬅ Volver</button>

        <div class="detalle-box">

           <h2 id="detalleNombre" style="text-align:center;"></h2>

<div class="stock-destacado">
    Aceites disponibles: <span id="detalleStock"></span>
</div>

            <div class="movimiento-box">

                <h4>Movimiento de Inventario</h4>

                <input type="number" id="cantidadMovimiento" placeholder="Cantidad">

                <textarea id="notaMovimiento" placeholder="Nota opcional"></textarea>

                <button class="btn-sumar" onclick="sumarStock()">➕ Agregar</button>
                <button class="btn-restar" onclick="restarStock()">➖ Restar</button>

            </div>

            <div id="historialMovimientos"></div>

        </div>

</div>

</section>


<!-- ================= VENTAS ================= -->
<section id="ventas" class="seccion">

<h1>Venta de Aceite</h1>

<div class="ventas-card">

<table class="tabla-ventas">
<thead>
<tr>
<th>Producto</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Total</th>
</tr>
</thead>

<tbody>
<tr>
<td>
<select id="productoVenta"></select>
</td>

<td>
<input type="number" id="cantidadVenta" min="1" value="1">
</td>

<td>$<span id="precioUnitario">0</span></td>
<td>$<span id="totalVenta">0</span></td>
</tr>
</tbody>
</table>

<div class="botones-ventas">
<button onclick="calcularTotal()" class="btn-sumar">Calcular</button>
<button onclick="vender()" class="btn-sumar">Confirmar</button>

</div>

<hr>

<h2 style="text-align:center; color:orange;">Historial de Ventas</h2>
<div id="listaHistorial"></div>

<h2 class="ganancia">
Ganancia Hoy: $<span id="gananciaHoy">0</span>
</h2>

<div class="botones-ventas">
<button onclick="borrarVentasHoy()" class="btn-restar">Borrar Ventas de Hoy</button>
<button onclick="reiniciarTodo()" class="btn-restar">Reiniciar Todo</button>
</div>

</div>

</section>


<!-- ================= ORDENES ================= -->
<div id="ordenes" class="seccion">

<h2 class="titulo-seccion">📋 Órdenes de Trabajo</h2>

<div class="ordenes-contenedor">

    <button class="btn-nuevo" onclick="mostrarFormularioOrden()">
        + Nueva Orden
    </button>

    <button class="btn-secundario" onclick="verVehiculos()">
        🚗 Vehículos
    </button>

    <!-- FORMULARIO -->
    <div id="formOrden" class="card-form" style="display:none;">

        <input id="clienteOrden" placeholder="Cliente">
        <input id="vehiculoOrden" placeholder="Vehículo">
        <input id="placaOrden" placeholder="Placas">
        <textarea id="descripcionOrden" placeholder="Descripción del trabajo"></textarea>

        <button class="btn-guardar" onclick="guardarOrden()">
            Guardar Orden
        </button>

    </div>

    <!-- LISTA VEHICULOS -->

</div>

</div>
<!-- ================= PRESUPUESTO ================= -->
<section id="presupuesto" class="seccion">

<h1>Generar Presupuesto</h1>

<div class="presupuesto-box">

<input type="text" id="nombreCliente" placeholder="Nombre del cliente">
<input type="text" id="marcaVehiculo" placeholder="Marca">
<input type="text" id="modeloVehiculo" placeholder="Modelo">
<input type="number" id="anioVehiculo" placeholder="Año">

<h3>Trabajos</h3>

<div id="listaTrabajos"></div>

<button onclick="agregarTrabajo()" class="btn-sumar">➕ Agregar Trabajo</button>

<h3>Resumen</h3>
<p>Subtotal: $<span id="subtotal">0</span></p>
<p>IVA (0.08%): $<span id="iva">0</span></p>
<p>Total: $<span id="total">0</span></p>

<button class="btn-sumar" onclick="generarPDF()">
Generar PDF
</button>

<script>
// ================= INVENTARIO BASE =================
let inventario = JSON.parse(localStorage.getItem("inventarioNuevo")) || [

{
    nombre:"Aceite 5W-30 Sintético",
    precio:850,
    stock:10,
    fecha:"01/02/2026",
    historial:[]
},

{
    nombre:"Filtro de Aceite Toyota",
    precio:250,
    stock:5,
    fecha:"01/02/2026",
    historial:[]
},

{
    nombre:"Anticongelante Rojo",
    precio:300,
    stock:8,
    fecha:"01/02/2026",
    historial:[]
}

];
// ================= MENU =================
function mostrar(id){

    // ocultar secciones
    document.querySelectorAll('.seccion').forEach(sec=>{
        sec.classList.remove('activa');
    });

    // mostrar sección seleccionada
    const seccion = document.getElementById(id);
    if(seccion) seccion.classList.add('activa');


    // ===== MENU ACTIVO =====
    document.querySelectorAll('.menu-lateral button').forEach(btn=>{
        btn.classList.remove('activo');
    });

    const botonActivo = document.getElementById(
        'btn' + id.charAt(0).toUpperCase() + id.slice(1)
    );

    if(botonActivo){
        botonActivo.classList.add('activo');
    }
}

let productoActual = null;

function guardarInventario(){
    localStorage.setItem("inventarioNuevo", JSON.stringify(inventario));
}
    function renderInventario(){

    const cont = document.getElementById("vistaLista");
    cont.innerHTML = "";

    inventario.forEach((item,i)=>{

        const colorStock = item.stock <= 3 ? "red" : "white";

        cont.innerHTML += `
            <div class="card-item" onclick="abrirDetalle(${i})">
                <h3>${item.nombre}</h3>
                <p style="color:${colorStock}">
                    Stock: ${item.stock}
                </p>
            </div>
        `;
    });
}



function abrirDetalle(index){

    productoActual = index;

    document.getElementById("vistaLista").style.display="none";
    document.getElementById("vistaDetalle").style.display="block";

    const item = inventario[index];

    document.getElementById("detalleNombre").innerText = item.nombre;
    document.getElementById("detalleStock").innerText = item.stock;

    renderHistorial();
    if(item.stock <= 3){
    document.getElementById("detalleStock").style.color="red";
}else{
    document.getElementById("detalleStock").style.color="white";
}
}



// ===== VOLVER =====
function volverLista(){

    document.getElementById("vistaLista").style.display="block";
    document.getElementById("vistaDetalle").style.display="none";

}



// ===== SUMAR STOCK =====
function sumarStock(){

    const cantidad = Number(document.getElementById("cantidadMovimiento").value);
    const nota = document.getElementById("notaMovimiento").value;

    if(isNaN(cantidad) || cantidad <= 0) return;

    const item = inventario[productoActual];

    item.stock += cantidad;

    item.historial.push({
        tipo:"Entrada",
        cantidad:cantidad,
        nota:nota || "",
        fecha:new Date().toLocaleString()
    });

    actualizarVista();
}



// ===== RESTAR STOCK =====
function restarStock(){

    const cantidad = Number(document.getElementById("cantidadMovimiento").value);
    const nota = document.getElementById("notaMovimiento").value;

    if(isNaN(cantidad) || cantidad <= 0) return;

    const item = inventario[productoActual];

    if(item.stock < cantidad){
        alert("No hay suficiente stock");
        return;
    }

    item.stock -= cantidad;

    item.historial.push({
        tipo:"Salida",
        cantidad:cantidad,
        nota:nota || "",
        fecha:new Date().toLocaleString()
    });

    actualizarVista();
}



// ===== ACTUALIZAR DETALLE =====
function actualizarVista(){

    guardarInventario();

    document.getElementById("detalleStock").innerText =
        inventario[productoActual].stock;

    document.getElementById("cantidadMovimiento").value="";
    document.getElementById("notaMovimiento").value="";

    renderHistorial();
renderInventario();
    if(inventario[productoActual].stock <= 3){
    document.getElementById("detalleStock").style.color="red";
}else{
    document.getElementById("detalleStock").style.color="white";
}
}



function renderHistorial(){

    const contenedor = document.getElementById("historialMovimientos");
    contenedor.innerHTML = "";

    const historial = inventario[productoActual].historial;

    if(historial.length === 0){
        contenedor.innerHTML = "<p>Sin movimientos</p>";
        return;
    }

    historial.slice().reverse().forEach((m,i)=>{

        const indexReal = historial.length - 1 - i;

        contenedor.innerHTML += `
            <div class="historial-item">
                <strong>${m.tipo}</strong> - ${m.cantidad}<br>
                ${m.fecha}<br>
                ${m.nota || ""}<br>
                <button onclick="borrarMovimiento(${indexReal})">
                    ❌ Borrar
                </button>
            </div>
        `;
    });
}


// ================= VENTAS (BASE SIMPLE) =================

let gananciaHoy = 0;
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
function vender(){

    const select = document.getElementById("productoVenta");
    const cantidad = Number(document.getElementById("cantidadVenta").value);

    const producto = inventario[select.value];

    if(producto.stock < cantidad){
        alert("No hay suficiente stock");
        return;
    }

    producto.stock -= cantidad;

    const totalVenta = producto.precio * cantidad;
    gananciaHoy += totalVenta;

    document.getElementById("gananciaHoy").innerText = gananciaHoy;

    // GUARDAR VENTA
    ventas.push({
        producto: producto.nombre,
        cantidad: cantidad,
        total: totalVenta,
        fecha: new Date().toLocaleString()
    });

    localStorage.setItem("ventas", JSON.stringify(ventas));

    // ALERTA STOCK
    if(producto.stock <= 3){
        alert("⚠ Stock bajo: " + producto.nombre);
    }

    guardarInventario();
    renderInventario();

    alert("Venta realizada ✅");
}

// ===== CARGAR SELECT VENTAS =====
function cargarProductosVenta(){

    const select = document.getElementById("productoVenta");
    if(!select) return;

    select.innerHTML="";

    inventario.forEach((item,index)=>{
        select.innerHTML += `
            <option value="${index}">
                ${item.nombre}
            </option>
        `;
    });
}



// ===== INICIAR =====
window.addEventListener("load", ()=>{
    guardarInventario();
    cargarProductosVenta();
    renderInventario();
});
   function borrarMovimiento(index){

    if(!confirm("¿Eliminar este movimiento?")) return;

    const item = inventario[productoActual];
    const movimiento = item.historial[index];

    // Revertir stock
    if(movimiento.tipo === "Entrada"){
        item.stock -= movimiento.cantidad;
    }else{
        item.stock += movimiento.cantidad;
    }

    item.historial.splice(index,1);

    guardarInventario();
    actualizarVista();
}
    
</script>
<script>

    let trabajos = [];

function agregarTrabajo(){
    const cont = document.getElementById("listaTrabajos");

    const index = trabajos.length;

    cont.innerHTML += `
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="number" placeholder="Cant." 
                onchange="actualizarTrabajo(${index}, 'cantidad', this.value)">
            <input type="text" placeholder="Descripción"
                onchange="actualizarTrabajo(${index}, 'descripcion', this.value)">
            <input type="number" placeholder="Importe"
                onchange="actualizarTrabajo(${index}, 'importe', this.value)">
        </div>
    `;

    trabajos.push({
        cantidad:0,
        descripcion:"",
        importe:0
    });
}

function actualizarTrabajo(index, campo, valor){
    trabajos[index][campo] = valor;
    calcularTotales();
}

function calcularTotales(){
    let subtotal = 0;

    trabajos.forEach(t=>{
        subtotal += Number(t.importe || 0);
    });

    const iva = subtotal * 0.16;
    const total = subtotal + iva;

    document.getElementById("subtotal").innerText = subtotal.toFixed(2);
    document.getElementById("iva").innerText = iva.toFixed(2);
    document.getElementById("total").innerText = total.toFixed(2);
}

async function generarPDF() {

    const { PDFDocument } = PDFLib;

    const existingPdfBytes = await fetch('Plantilla_Borjon.pdf').then(res => res.arrayBuffer());
    const pdfDoc = await PDFDocument.load(existingPdfBytes);
    const page = pdfDoc.getPages()[0];

    const nombre = document.getElementById("nombreCliente").value;
    const marca = document.getElementById("marcaVehiculo").value;
    const modelo = document.getElementById("modeloVehiculo").value;
    const anioVehiculo = document.getElementById("anioVehiculo").value;

    const vehiculo = marca + " " + modelo + " " + anioVehiculo;

    const fecha = new Date();
    const dia = fecha.getDate().toString();
    const mes = (fecha.getMonth()+1).toString();
    const año = fecha.getFullYear().toString();
//ENCABEZADO//
  const fontSizeFecha = 12;

function drawCentered(text, centerX, yPos){
    const textWidth = text.length * 6;
    page.drawText(text, { 
        x: centerX - (textWidth / 2), 
        y: yPos, 
        size: fontSizeFecha 
    });
}

// Ajusta estos centros si hace falta mover 2-3 px
drawCentered(dia, 115, 598);
drawCentered(mes, 190, 598);
drawCentered(año, 265, 598);

   page.drawText(nombre, { x: 360, y: 635, size: 12 });
   page.drawText(vehiculo, { x: 360, y: 595, size: 12 });

// ===== TABLA =====
let y = 540;
const fontSize = 10;

trabajos.forEach(t => {

    // CANTIDAD
    page.drawText(String(t.cantidad), { x: 70, y: y, size: fontSize });

    // DESCRIPCIÓN
    page.drawText(t.descripcion || "", { x: 120, y: y, size: fontSize });

    // IMPORTE
    const importeTexto = "$" + Number(t.importe).toFixed(2);
    const textWidth = importeTexto.length * 5.5;
    const xPosition = 545 - textWidth;

    page.drawText(importeTexto, { x: xPosition, y: y, size: fontSize });

    y -= 18;
});
    let subtotal = 0;

trabajos.forEach(t=>{
    subtotal += Number(t.importe || 0);
});

const iva = subtotal * 0.08;
const total = subtotal + iva;

    // ===== TOTALES =====
  function drawRight(text, yPos){
    const textWidth = text.length * 6;
    page.drawText(text, { x: 545 - textWidth, y: yPos, size: 12 });
}

drawRight("$" + subtotal.toFixed(2), 180);
drawRight("$" + iva.toFixed(2), 160);
